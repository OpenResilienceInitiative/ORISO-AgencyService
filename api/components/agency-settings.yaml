openapi: 3.0.1
info:
  title: Shared agency settings schemas
  version: 1.0.0
components:
  schemas:
    AgencyAdminAllowedPermissionToggles:
      type: object
      properties:
        appearance:
          type: boolean
          example: true
        anonymousChat:
          type: boolean
          example: true
        calls:
          type: boolean
          example: true
        groupChat:
          type: boolean
          example: true
        supervision:
          type: boolean
          example: true
        supervisionAnonymousChats:
          type: boolean
          example: true
        supervisionOneOnOneChats:
          type: boolean
          example: true
        audioCalls:
          type: boolean
          example: true
        audioCallsAnonymousChats:
          type: boolean
          example: true
        audioCallsOneOnOneChats:
          type: boolean
          example: true
        audioCallsGroupChats:
          type: boolean
          example: true
        audioCallsSupervisionChats:
          type: boolean
          example: true
        videoCalls:
          type: boolean
          example: true
        videoCallsAnonymousChats:
          type: boolean
          example: true
        videoCallsOneOnOneChats:
          type: boolean
          example: true
        videoCallsGroupChats:
          type: boolean
          example: true
        videoCallsSupervisionChats:
          type: boolean
          example: true
        threads:
          type: boolean
          example: true
        threadsAnonymousChats:
          type: boolean
          example: true
        threadsOneOnOneChats:
          type: boolean
          example: true
        threadsGroupChats:
          type: boolean
          example: true
        threadsSupervisionChats:
          type: boolean
          example: true
        voiceMessages:
          type: boolean
          example: true
        voiceMessagesAnonymousChats:
          type: boolean
          example: true
        voiceMessagesOneOnOneChats:
          type: boolean
          example: true
        voiceMessagesGroupChats:
          type: boolean
          example: true
        voiceMessagesSupervisionChats:
          type: boolean
          example: true

    AgencyAdminControls:
      type: object
      properties:
        permissionsPageEnabled:
          type: boolean
          example: true
        allowedPermissionToggles:
          $ref: '#/components/schemas/AgencyAdminAllowedPermissionToggles'

    Settings:
      type: object
      properties:
        featureStatisticsEnabled:
          type: boolean
          example: false
        featureTopicsEnabled:
          type: boolean
          example: false
        topicsInRegistrationEnabled:
          type: boolean
          example: false
        featureDemographicsEnabled:
          type: boolean
          example: false
        featureAppointmentsEnabled:
          type: boolean
          example: false
        featureGroupChatV2Enabled:
          type: boolean
          example: false
        featureToolsEnabled:
          type: boolean
          example: false
        featureAnonymousChatEnabled:
          type: boolean
          example: true
        featureCallsEnabled:
          type: boolean
          example: true
        featureSupervisionEnabled:
          type: boolean
          example: true
          description: "Master toggle for supervision functionality (adding/removing supervisors, supervision views)."
        featureSupervisionAnonymousChatsEnabled:
          type: boolean
          example: true
          description: "Enable supervision functionality in anonymous chats."
        featureSupervisionOneOnOneChatsEnabled:
          type: boolean
          example: true
          description: "Enable supervision functionality in 1-on-1 chats."
        featureAudioCallsEnabled:
          type: boolean
          example: true
          description: "Master toggle for audio call button availability (all chat types)."
        featureAudioCallsAnonymousChatsEnabled:
          type: boolean
          example: true
          description: "Enable audio call button in anonymous chats."
        featureAudioCallsOneOnOneChatsEnabled:
          type: boolean
          example: true
          description: "Enable audio call button in 1-on-1 chats."
        featureAudioCallsGroupChatsEnabled:
          type: boolean
          example: true
          description: "Enable audio call button in group chats."
        featureAudioCallsSupervisionChatsEnabled:
          type: boolean
          example: true
          description: "Enable audio call button when a user is in supervision mode."
        featureVideoCallsEnabled:
          type: boolean
          example: true
          description: "Master toggle for video call button availability (all chat types)."
        featureVideoCallsAnonymousChatsEnabled:
          type: boolean
          example: true
          description: "Enable video call button in anonymous chats."
        featureVideoCallsOneOnOneChatsEnabled:
          type: boolean
          example: true
          description: "Enable video call button in 1-on-1 chats."
        featureVideoCallsGroupChatsEnabled:
          type: boolean
          example: true
          description: "Enable video call button in group chats."
        featureVideoCallsSupervisionChatsEnabled:
          type: boolean
          example: true
          description: "Enable video call button when a user is in supervision mode."
        featureThreadsEnabled:
          type: boolean
          example: true
          description: "Master toggle for threads availability (all chat types)."
        featureThreadsAnonymousChatsEnabled:
          type: boolean
          example: true
          description: "Enable threads in anonymous chats."
        featureThreadsGroupChatsEnabled:
          type: boolean
          example: true
          description: "Enable threads in group chats."
        featureThreadsOneOnOneEnabled:
          type: boolean
          example: true
          description: "Enable threads in 1-on-1 chats."
        featureThreadsSupervisionChatsEnabled:
          type: boolean
          example: true
          description: "Enable threads when a user is in supervision mode."
        featureVoiceMessagesEnabled:
          type: boolean
          example: true
          description: "Master toggle for voice messages availability (all chat types)."
        featureVoiceMessagesAnonymousChatsEnabled:
          type: boolean
          example: true
          description: "Enable voice messages in anonymous chats."
        featureVoiceMessagesOneOnOneChatsEnabled:
          type: boolean
          example: true
          description: "Enable voice messages in 1-on-1 chats."
        featureVoiceMessagesGroupChatsEnabled:
          type: boolean
          example: true
          description: "Enable voice messages in group chats."
        featureVoiceMessagesSupervisionChatsEnabled:
          type: boolean
          example: true
          description: "Enable voice messages when a user is in supervision mode."
        featureAttachmentUploadDisabled:
          type: boolean
          example: false
        featureToolsOICDToken:
          type: string
          example: "1234-1234-1234-1234"
        activeLanguages:
          type: array
          items:
            type: string
          example: "[en, de, fr]"
        showAskerProfile:
          type: boolean
          default: false
          example: false
        isVideoCallAllowed:
          type: boolean
          default: false
          example: false
        featureSystemNotificationEmailsEnabled:
          type: boolean
          example: false
        featureCentralDataProtectionTemplateEnabled:
          type: boolean
          example: false
        agencyAdminControls:
          $ref: '#/components/schemas/AgencyAdminControls'
